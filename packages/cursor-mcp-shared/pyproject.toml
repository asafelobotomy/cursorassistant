[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "cursor-mcp-shared"
version = "0.9.0"
description = "Shared workspace discovery and MCP helpers for cursorAssistant MCP servers"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"

[project.optional-dependencies]
dev = ["pytest"]

[tool.setuptools.packages.find]
where = ["."]
include = ["cursor_mcp_shared*"]
