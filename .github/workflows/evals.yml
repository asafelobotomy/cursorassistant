name: Evals

on:
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  eval-static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pyyaml

      - name: Validate all eval suites
        run: python3 tools/cursorEval/cursorEval.py --repo-root . validate

      - name: Eval coverage (strict)
        run: python3 tools/cursorEval/cursorEval.py --repo-root . coverage --strict

      - name: Dry-run core eval suites
        run: |
          for suite in lifecycleAudit surfaceReview testing inventory task-triage workspaceSearch ciPreflight depSearch models-smoke cursorAssistantSetup; do
            python3 tools/cursorEval/cursorEval.py --repo-root . run "evals/${suite}/eval.yaml" --dry-run
          done

  eval-models-pr:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pyyaml

      - name: PR smoke (GitHub Models, 3 tasks)
        env:
          GITHUB_MODELS_TOKEN: ${{ secrets.GITHUB_MODELS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/eval_models_pr_smoke.sh

  eval-models:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pyyaml

      - name: Run lifecycleAudit eval (GitHub Models)
        env:
          GITHUB_MODELS_TOKEN: ${{ secrets.GITHUB_MODELS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 tools/cursorEval/cursorEval.py --repo-root . run evals/lifecycleAudit/eval.yaml

      - name: Run models-smoke eval
        env:
          GITHUB_MODELS_TOKEN: ${{ secrets.GITHUB_MODELS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 tools/cursorEval/cursorEval.py --repo-root . run evals/models-smoke/eval.yaml

      - name: Live routing evals (models-smoke + agents + setup skill)
        env:
          GITHUB_MODELS_TOKEN: ${{ secrets.GITHUB_MODELS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/eval_routing_live.sh

  eval-quality:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pyyaml

      - name: LLM quality on changed core skills
        env:
          GITHUB_MODELS_TOKEN: ${{ secrets.GITHUB_MODELS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVAL_QUALITY_BASE: origin/${{ github.event.repository.default_branch }}
          EVAL_QUALITY_FAIL_UNDER: "0.65"
        run: bash scripts/eval_quality_changed.sh
