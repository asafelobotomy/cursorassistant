# Push regenerated install/ artifacts to asafelobotomy.github.io (live Pages).
# Requires repo secret INSTALL_WEBSITE_TOKEN (fine-grained PAT: contents write on github.io repo).

name: Publish install website

on:
  push:
    branches: [master, main]
    paths:
      - VERSION
      - install/index.template.html
      - scripts/generate_install_page.py
      - template/setup/catalog.json
  workflow_dispatch:
    inputs:
      pages_ref:
        description: "Target branch on asafelobotomy.github.io"
        required: false
        default: "main"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Require INSTALL_WEBSITE_TOKEN
        env:
          HAS_TOKEN: ${{ secrets.INSTALL_WEBSITE_TOKEN }}
        run: |
          if [ -z "$HAS_TOKEN" ]; then
            echo "::error::Add INSTALL_WEBSITE_TOKEN (write access to asafelobotomy.github.io) to publish the install page."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: asafelobotomy/asafelobotomy.github.io
          ref: ${{ github.event.inputs.pages_ref || 'main' }}
          token: ${{ secrets.INSTALL_WEBSITE_TOKEN }}
          path: pages

      - name: Generate install artifacts into pages repo
        run: |
          python3 pages/scripts/generate_cursorassistant_install.py \
            --package-root "$GITHUB_WORKSPACE"

      - name: Push to github.io (auto-publish)
        working-directory: pages
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cursorassistant/install/
          if git diff --staged --quiet; then
            echo "No install page changes to publish."
            exit 0
          fi
          git commit -m "chore: sync cursorAssistant install from cursorassistant@${GITHUB_SHA::7}"
          git push origin HEAD
