name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install pyyaml

      - name: Validate plugin manifest
        run: python3 scripts/validate_plugin.py

      - name: CHANGELOG documents VERSION
        run: python3 scripts/changelog_release.py verify

      - name: Package sync (manifest + dogfood)
        run: python3 scripts/check_package_sync.py

      - name: Unit tests
        run: python3 -m unittest discover -s tests -v

      - name: cursorEval validate
        run: python3 tools/cursorEval/cursorEval.py --repo-root . validate

      - name: cursorEval coverage (strict)
        run: python3 tools/cursorEval/cursorEval.py --repo-root . coverage --strict

      - name: cursorEval policy (skills, agents, rules)
        run: python3 tools/cursorEval/cursorEval.py --repo-root . policy

      - name: cursorEval check (core and pack surfaces)
        run: bash scripts/ci_check_surfaces.sh

