name: GitHub Pages

on:
  push:
    branches: [master, main]
    paths:
      - install/**
      - index.html
      - VERSION
      - scripts/generate_install_page.py
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate install page
        run: python3 scripts/generate_install_page.py

      - name: Verify install page matches VERSION
        run: python3 scripts/check_install_page.py

      - name: Prepare site artifact
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          cp index.html _site/
          cp -r install _site/install
          touch _site/.nojekyll _site/install/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
