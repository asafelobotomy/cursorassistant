name: "cursorAssistantSetup-eval"
description: "Evaluates cursorAssistantSetup skill routing for first-time project install"

graders:
  - type: text
    name: references_setup
    config:
      pattern: "(?i)(cursorAssistantSetup|configure|lifecycle_configure|setup-workspace)"

  - type: behavior
    name: response_budget
    config:
      max_tokens: 800

tasks:
  - "tasks/*.yaml"
