name: "workspaceSearch-eval"
description: "Evaluates workspaceSearch skill tool choice (Grep vs SemanticSearch vs Glob)"

graders:
  - type: text
    name: references_skill
    config:
      pattern: "(?i)(workspaceSearch|Grep|SemanticSearch|Glob|Read)"

  - type: behavior
    name: response_budget
    config:
      max_tokens: 800

tasks:
  - "tasks/*.yaml"
