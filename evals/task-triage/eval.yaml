name: "task-triage-eval"
description: "Evaluates task-triage skill routing before subagents"

graders:
  - type: text
    name: references_skill
    config:
      pattern: "(?i)(task-triage|/task-triage|tier:|trivial|compound|complex|blocked)"

  - type: behavior
    name: response_budget
    config:
      max_tokens: 800

tasks:
  - "tasks/*.yaml"
