name: "cursorLifecycle-eval"
description: "Evaluates cursorLifecycle subagent routing"

graders:
  - type: text
    name: references_agent
    config:
      pattern: "(?i)(cursorLifecycle|subagent)"

  - type: behavior
    name: response_budget
    config:
      max_tokens: 800

tasks:
  - "tasks/*.yaml"
