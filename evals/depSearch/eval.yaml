name: "depSearch-eval"
description: "Evaluates depSearch skill for dependency discovery and audit research"

graders:
  - type: text
    name: references_skill
    config:
      pattern: "(?i)(depSearch|dependency|audit|lockfile|package)"

  - type: behavior
    name: response_budget
    config:
      max_tokens: 800

tasks:
  - "tasks/*.yaml"
