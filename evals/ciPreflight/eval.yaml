name: "ciPreflight-eval"
description: "Evaluates ciPreflight skill for local CI before commit"

graders:
  - type: text
    name: references_skill
    config:
      pattern: "(?i)(ciPreflight|workflow|\\.github/workflows|Shell|staged)"

  - type: behavior
    name: response_budget
    config:
      max_tokens: 800

tasks:
  - "tasks/*.yaml"
